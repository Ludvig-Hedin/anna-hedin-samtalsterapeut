"use strict"; // fix lenis in safari
if (Webflow.env("editor") === undefined) {
  const lenis = new Lenis({

    normalizeWheel: false,
    smoothTouch: false
  });
  function raf(time) {
    lenis.raf(time);
    requestAnimationFrame(raf);
  }
  requestAnimationFrame(raf);
  $("[data-lenis-start]").on("click", function () {
    lenis.start();
  });
  $("[data-lenis-stop]").on("click", function () {
    lenis.stop();
  });
  $("[data-lenis-toggle]").on("click", function () {
    $(this).toggleClass("stop-scroll");
    if ($(this).hasClass("stop-scroll")) {
      lenis.stop();
    } else {
      lenis.start();
    }
  });
  function connectToScrollTrigger() {
    lenis.on("scroll", ScrollTrigger.update);
    gsap.ticker.add((time) => {
      lenis.raf(time * 1000);
    });
  }
  // Uncomment this if using GSAP ScrollTrigger
  // connectToScrollTrigger();
}
</script>

  <!--  Animations  -->
  <script>
// Page load animations
document.addEventListener("DOMContentLoaded", () => {
  // Hämta alla element med attributet "animation-fade-blur"
  const fadeBlurElements = document.querySelectorAll('[animation-fade-blur]');
  // Använd gsap.from på fadeBlurElements med stagger-effekt
  gsap.from(fadeBlurElements, {
    y: 24,
    autoAlpha: 0,
    filter: "blur(10px)",
    duration: 1, // justera längden på animationen om så önskas
    ease: "power2.out",
    stagger: 0.2 // fördröjning mellan varje element
  });
  // Hämta alla element med attributet "animation-fade"
  const fadeElements = document.querySelectorAll('[animation-fade]');
  // Använd gsap.from på fadeElements med stagger-effekt
  gsap.from(fadeElements, {
    autoAlpha: 0, // Gör elementet osynligt vid start
    duration: 1, // justera längden på animationen om så önskas
    ease: "power2.out",
    stagger: 0.2 // fördröjning mellan varje element
  });
});
// Scroll-animationer
// Selektorn för elementen med attributet animation-scroll-blur
const scrollBlurElements = document.querySelectorAll('[animation-scroll-blur]');
// Loopar igenom varje element och skapar en individuell animation kopplad till ScrollTrigger
scrollBlurElements.forEach((element) => {
  gsap.from(element, {
    autoAlpha: 0,
    filter: "blur(5px)",
    y: 24,
    duration: 1, // justera längden på animationen om så önskas
    delay: 0.25,
    ease: "power2.out",
    stagger: 0.2, // fördröjning mellan varje element
    scrollTrigger: {
    	markers: false,
      	trigger: element, // vilket element som triggar animationen
     	start: "top bottom", // när i viewport animationen ska börja
      	toggleActions: "restart none none none" // hur animationen beter sig
    }
  });
});
</script>
